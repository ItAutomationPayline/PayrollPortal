spring.application.name=payroll-portal-backend
server.port=8080

# ---------------------------------------------------------------------------
# Database - MySQL (default). Set values via environment variables or edit here.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:payroll_portal}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${DB_USER:payline}
spring.datasource.password=${DB_PASSWORD:payline}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ---------------------------------------------------------------------------
# File storage - path on the Windows server. Example: C:/payline/storage
# ---------------------------------------------------------------------------
app.storage.root=${STORAGE_ROOT:./storage}

# Max upload size
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# ---------------------------------------------------------------------------
# JWT - REPLACE the secret with a long random value for anything beyond demo.
# Must be at least 32 chars (256-bit) for HS256.
# ---------------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-of-at-least-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

# ---------------------------------------------------------------------------
# CORS - Angular dev server + the static-IP Windows server origin.
# Comma-separated. Add your server's http://<static-ip>:<port> here.
# ---------------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}
