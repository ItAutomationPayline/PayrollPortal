# ---------------------------------------------------------------------------
# SQL Server profile. Activate with:  --spring.profiles.active=sqlserver
# Also uncomment the mssql-jdbc dependency in pom.xml and comment out mysql.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:payroll_portal};encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USER:payline}
spring.datasource.password=${DB_PASSWORD:payline}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
