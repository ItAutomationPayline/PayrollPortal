<header class="bg-surface-container-lowest border-b border-outline-variant fixed top-0 w-full z-50">
  <div class="flex justify-between items-center px-lg py-sm w-full max-w-container-max mx-auto h-16">
    <div class="flex items-center gap-sm">
      <img src="favicon.ico" alt="Logo" width="28" height="28">
      <span class="font-headline-md text-headline-md font-bold text-primary">Payline</span>
    </div>

    <div class="flex items-center gap-md">
      <nav class="hidden md:flex h-full items-center gap-md">
        <a class="px-sm py-xs font-label-md text-label-md transition-colors cursor-pointer"
           [ngClass]="active === 'dashboard' ? 'text-primary font-bold border-b-2 border-primary' : 'text-on-surface-variant hover:bg-surface-container-low'"
           routerLink="/dashboard">Dashboard</a>
        <a class="px-sm py-xs font-label-md text-label-md transition-colors cursor-pointer"
           [ngClass]="active === 'file-upload' ? 'text-primary font-bold border-b-2 border-primary' : 'text-on-surface-variant hover:bg-surface-container-low'"
           routerLink="/file-upload">File Upload</a>
        <a class="px-sm py-xs font-label-md text-label-md transition-colors cursor-pointer"
           [ngClass]="active === 'status' ? 'text-primary font-bold border-b-2 border-primary' : 'text-on-surface-variant hover:bg-surface-container-low'"
           routerLink="/status">History</a>
        <a *ngIf="isPaylineSide" class="px-sm py-xs font-label-md text-label-md transition-colors cursor-pointer"
           [ngClass]="active === 'users' ? 'text-primary font-bold border-b-2 border-primary' : 'text-on-surface-variant hover:bg-surface-container-low'"
           routerLink="/users">User Management</a>
      </nav>

      <div class="flex items-center gap-sm">
        <div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container text-xs font-bold border border-outline-variant"
             [title]="fullName">
          {{ initials }}
        </div>
        <button (click)="logout()"
                class="flex items-center gap-xs px-sm py-xs rounded-lg font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors cursor-pointer"
                title="Log out">
          <span class="material-symbols-outlined !text-[18px]">logout</span>
          <span class="hidden md:inline">Logout</span>
        </button>
      </div>
    </div>
  </div>
</header>
