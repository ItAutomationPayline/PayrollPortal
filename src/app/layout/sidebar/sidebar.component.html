<aside class="fixed left-0 top-16 h-[calc(100vh-64px)] w-[280px] bg-surface-container-low border-r border-outline-variant hidden md:flex flex-col gap-xs p-md z-40">
  <div class="px-md py-sm mb-md">
    <span class="font-headline-sm text-headline-sm font-bold text-primary">Payroll Portal</span>
  </div>

  <nav class="flex flex-col gap-xs">
    <a *ngFor="let item of navItems"
       class="flex items-center gap-md px-md py-sm rounded-full transition-all cursor-pointer"
       [ngClass]="active === item.key
          ? 'bg-primary-container text-on-primary-container font-bold scale-[0.98]'
          : 'text-on-surface-variant hover:bg-surface-container-high'"
       [routerLink]="item.route">
      <span class="material-symbols-outlined">{{ item.icon }}</span>
      <span class="font-label-md text-label-md">{{ item.label }}</span>
    </a>
  </nav>

  <div *ngIf="showCycle" class="mt-auto p-md bg-surface-container-lowest border border-outline-variant rounded-xl">
    <p class="font-label-md text-label-md text-on-surface-variant mb-xs">Active Cycle</p>
    <div class="flex items-center gap-sm">
      <div class="payroll-cycle-dot"></div>
      <span class="font-body-sm text-body-sm font-bold text-primary">Q4-OCT-2024</span>
    </div>
  </div>
</aside>
